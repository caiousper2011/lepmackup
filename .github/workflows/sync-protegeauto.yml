name: Sync from protegeauto

on:
  repository_dispatch:
    types: [protegeauto-update]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lepmackup
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add protegeauto remote
        run: |
          git remote add protegeauto https://github.com/caiousper2011/protegeauto.git
          git fetch protegeauto

      - name: Show protegeauto branches
        run: git branch -r | grep protegeauto
